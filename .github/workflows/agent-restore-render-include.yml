name: Agent Restore Render Include

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-restore-render-include
  cancel-in-progress: true

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check out portability branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-windows-dos-portability
          fetch-depth: 0

      - name: Restore exact renderer and remove duplicate curses include
        run: |
          git show 98f7ae512c21c8d3bd6fba14f217457dff9282d9:src/render/render.c > src/render/render.c
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/render/render.c')
          text = path.read_text(encoding='utf-8')
          needle = '#include <curses.h>\n'
          if text.count(needle) != 1:
              raise SystemExit(f'expected one direct curses include, found {text.count(needle)}')
          path.write_text(text.replace(needle, '', 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/render/render.c
          git diff --cached --check
          git commit -m "fix: centralize curses include ordering"
          git pull --rebase origin agent/fix-windows-dos-portability
          git push origin HEAD:agent/fix-windows-dos-portability
