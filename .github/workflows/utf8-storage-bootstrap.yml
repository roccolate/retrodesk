name: Materialize UTF-8 storage port

on:
  pull_request:
    branches: [main, master]
    paths:
      - scripts/apply_utf8_storage_port.py
      - .github/workflows/utf8-storage-bootstrap.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/notepad-utf8-storage'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/notepad-utf8-storage
          fetch-depth: 0
          persist-credentials: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq cmake gcc libncurses-dev python3 >/dev/null

      - name: Apply storage port
        run: python3 scripts/apply_utf8_storage_port.py

      - name: Run source guards
        run: |
          git diff --check
          python3 scripts/check_test_oracles.py
          python3 scripts/check_djgpp_sources.py

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DENABLE_STRICT_WARNINGS=ON \
            -DENABLE_WERROR=ON >/tmp/configure.log 2>&1 || {
              cat /tmp/configure.log
              exit 1
            }

      - name: Build
        run: |
          cmake --build build --parallel >/tmp/build.log 2>&1 || {
            mkdir -p ci-artifacts
            cp /tmp/build.log ci-artifacts/utf8-storage-build.log
            git config user.name "RetroDesk CI"
            git config user.email "actions@users.noreply.github.com"
            git add ci-artifacts/utf8-storage-build.log
            git commit -m "ci: capture UTF-8 storage build failure" -- \
              ci-artifacts/utf8-storage-build.log
            git push origin HEAD:agent/notepad-utf8-storage
            exit 1
          }

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Publish verified storage port
        run: |
          rm -f scripts/apply_utf8_storage_port.py
          rm -f .github/workflows/utf8-storage-bootstrap.yml
          rm -f ci-artifacts/utf8-storage-build.log
          git config user.name "RetroDesk CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: support validated UTF-8 text storage"
          git push origin HEAD:agent/notepad-utf8-storage
