name: Materialize Notepad selection clipboard

on:
  pull_request:
    branches: [main, master]
    paths:
      - scripts/apply_notepad_selection_clipboard.py
      - scripts/fix_notepad_selection_apply.py
      - .github/workflows/notepad-selection-bootstrap.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/notepad-selection-clipboard'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/notepad-selection-clipboard
          fetch-depth: 1
          persist-credentials: true
          show-progress: false

      - name: Build and test selection integration
        shell: bash
        run: |
          set -u

          run_logged() {
            local label="$1"
            shift
            local log="/tmp/${label}.log"
            if ! "$@" >"$log" 2>&1; then
              local summary
              summary=$(grep -m1 -E 'Test +#[0-9]+:.*\*\*\*Failed|TEST_REQUIRE|FAILED|Failure|Errors while running CTest|error:' "$log" || tail -n 1 "$log")
              echo "::error title=${label}::${summary}"
              tail -n 80 "$log"
              exit 1
            fi
          }

          python3 scripts/fix_notepad_selection_apply.py
          python3 scripts/apply_notepad_selection_clipboard.py

          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq cmake gcc libncurses-dev python3 >/dev/null

          run_logged diff-check git diff --check
          run_logged oracle-guard python3 scripts/check_test_oracles.py
          run_logged djgpp-guard python3 scripts/check_djgpp_sources.py
          run_logged configure cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DENABLE_STRICT_WARNINGS=ON \
            -DENABLE_WERROR=ON
          run_logged build cmake --build build --parallel
          run_logged tests ctest --test-dir build --output-on-failure

      - name: Publish verified integration
        run: |
          rm -f scripts/apply_notepad_selection_clipboard.py
          rm -f scripts/fix_notepad_selection_apply.py
          rm -f .github/workflows/notepad-selection-bootstrap.yml
          git config user.name "RetroDesk CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: add UTF-8 Notepad selection and clipboard"
          git push origin HEAD:agent/notepad-selection-clipboard
