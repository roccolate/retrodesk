static int np_body_rows(const RetroAppInstance *instance, int body_y) {
    int rows = np_window_height(instance) - 2 - body_y;
    return rows > 0 ? rows : 0;
}

static size_t np_cursor_display_column(const NotepadState *state) {
    if (!state || !state->buffer) return 0;
    size_t row = text_buffer_cursor_row(state->buffer);
    const char *line = text_buffer_line(state->buffer, row);
    if (!line) return 0;
    size_t length = strlen(line);
    size_t byte_column = text_buffer_cursor_col(state->buffer);
    if (byte_column > length) byte_column = length;
    return retro_utf8_columns(line, length, 0, byte_column);
}

static void np_menu_callback(size_t menu_index, size_t item_index,
                             void *user_data) {
    NotepadState *state = (NotepadState *)user_data;
    if (!state) return;
    state->pending_menu_action = NP_MENU_NONE;
    if (menu_index == 0) {
        switch (item_index) {
            case 0: state->pending_menu_action = NP_MENU_NEW; break;
            case 1: state->pending_menu_action = NP_MENU_OPEN; break;
            case 2: state->pending_menu_action = NP_MENU_SAVE; break;
            case 3: state->pending_menu_action = NP_MENU_SAVE_AS; break;
            case 5: state->pending_menu_action = NP_MENU_CLOSE; break;
            default: break;
        }
    } else if (menu_index == 1) {
        switch (item_index) {
            case 0: state->pending_menu_action = NP_MENU_UNDO; break;
            case 1: state->pending_menu_action = NP_MENU_REDO; break;
            case 2: state->pending_menu_action = NP_MENU_CUT; break;
            case 3: state->pending_menu_action = NP_MENU_COPY; break;
            case 4: state->pending_menu_action = NP_MENU_PASTE; break;
            case 5: state->pending_menu_action = NP_MENU_SELECT_ALL; break;
            case 6: state->pending_menu_action = NP_MENU_FIND; break;
            default: break;
        }
    } else if (menu_index == 2 && item_index == 0) {
        state->pending_menu_action = NP_MENU_TOGGLE_WRAP;
    }
}

static bool np_menu_create(NotepadState *state) {
    if (!state) return false;
    state->menu_bar = menu_bar_create();
    if (!state->menu_bar) return false;

    bool ok = menu_bar_add_menu(state->menu_bar, "File", 'F') &&
              menu_bar_add_menu(state->menu_bar, "Edit", 'E') &&
              menu_bar_add_menu(state->menu_bar, "View", 'V') &&
              menu_bar_add_item(state->menu_bar, 0, "New        Ctrl+N", 'N',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 0, "Open...    Ctrl+O", 'O',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 0, "Save       Ctrl+S", 'S',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 0, "Save As... F3", 0,
                                np_menu_callback, state) &&
              menu_bar_add_separator(state->menu_bar, 0) &&
              menu_bar_add_item(state->menu_bar, 0, "Close      Ctrl+W", 'C',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Undo       Ctrl+Z", 'U',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Redo       Ctrl+Y", 'R',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Cut        Ctrl+X", 0,
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Copy       Ctrl+C", 'C',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Paste      Ctrl+V", 'P',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Select All Ctrl+A", 'S',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 1, "Find...    Ctrl+F", 'F',
                                np_menu_callback, state) &&
              menu_bar_add_item(state->menu_bar, 2, "Word Wrap  F4", 'W',
                                np_menu_callback, state);
    if (!ok) {
        menu_bar_destroy(state->menu_bar);
        state->menu_bar = NULL;
        return false;
    }
    return true;
}

static int np_menu_dropdown_x(const NotepadState *state) {
    if (!state || !state->menu_bar || !menu_bar_is_open(state->menu_bar)) {
        return 1;
    }
    size_t open_menu = menu_bar_open_menu(state->menu_bar);
    int x = 3;
    for (size_t index = 0; index < open_menu; ++index) {
        x += (int)strlen(menu_bar_menu_label(state->menu_bar, index)) + 2;
    }
    return x;
}

