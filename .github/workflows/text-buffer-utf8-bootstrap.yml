name: Materialize UTF-8 TextBuffer tests

on:
  pull_request:
    branches: [main, master]
    paths:
      - scripts/apply_text_buffer_utf8_tests.py
      - .github/workflows/text-buffer-utf8-bootstrap.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/notepad-utf8-core'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/notepad-utf8-core
          fetch-depth: 0
          persist-credentials: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libncurses-dev python3

      - name: Materialize and validate UTF-8 tests
        run: |
          python3 scripts/apply_text_buffer_utf8_tests.py
          git diff --check
          python3 scripts/check_test_oracles.py
          python3 scripts/check_djgpp_sources.py
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DENABLE_STRICT_WARNINGS=ON \
            -DENABLE_WERROR=ON
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Publish permanent UTF-8 tests
        run: |
          rm -f scripts/apply_text_buffer_utf8_tests.py
          rm -f .github/workflows/text-buffer-utf8-bootstrap.yml
          git config user.name "RetroDesk CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: cover UTF-8 TextBuffer editing"
          git push origin HEAD:agent/notepad-utf8-core
