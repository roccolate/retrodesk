name: Materialize Desktop-owned clipboard

on:
  pull_request:
    branches: [core/safe-global-shutdown]
    paths:
      - tools/materialize_owned_clipboard.py
      - .github/workflows/materialize-owned-clipboard.yml

permissions:
  contents: write

env:
  RETROCORE_SPEC_COMMIT: fa027a04fca45728c2c09833388c553bfa8a5a54

jobs:
  materialize:
    if: github.head_ref == 'core/owned-clipboard'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout pinned fixtures
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: roccolate/retrocore-spec
          ref: ${{ env.RETROCORE_SPEC_COMMIT }}
          path: retrocore-spec

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libncurses-dev python3

      - name: Apply owned clipboard slice
        run: python3 tools/materialize_owned_clipboard.py

      - name: Guard generated tree
        run: |
          git diff --check
          python3 scripts/check_test_oracles.py
          python3 scripts/check_djgpp_sources.py
          ! grep -R "g_clipboard_" -n src tests
          ! grep -R "retro_clipboard_set_text([^,]*,[^,)]*)" -n src tests || false
          ! grep -R "retro_clipboard_text(NULL)" -n src tests
          ! grep -R "retro_clipboard_has_text()" -n src tests
          ! grep -R "retro_clipboard_clear()" -n src tests

      - name: Configure strict fixture-backed Debug build
        run: |
          cmake -S . -B build/owned-clipboard \
            -DCMAKE_BUILD_TYPE=Debug \
            -DRETROCORE_SPEC_DIR="$PWD/retrocore-spec" \
            -DRETROCORE_SPEC_REQUIRED=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_STRICT_WARNINGS=ON \
            -DENABLE_WERROR=ON

      - name: Build and test
        run: |
          cmake --build build/owned-clipboard --parallel
          ctest --test-dir build/owned-clipboard --output-on-failure

      - name: Publish verified source tree
        run: |
          rm -rf retrocore-spec build/owned-clipboard
          rm -f tools/materialize_owned_clipboard.py
          rm -f .github/workflows/materialize-owned-clipboard.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "core: make clipboard a Desktop-owned service"
          git push origin HEAD:${{ github.head_ref }}
