name: Materialize native Notepad UX

on:
  push:
    branches:
      - agent/notepad-native-ux

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev

      - name: Apply focused native Notepad UX slice
        shell: bash
        run: |
          python3 - <<'PY'
