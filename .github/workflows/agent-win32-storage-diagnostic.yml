name: Agent Win32 Storage Diagnostic

on:
  push:
    branches: [agent/native-win32-storage]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  VCPKG_COMMIT: f87344cac03158cbf1467264565f1fd36b382a24

jobs:
  diagnose:
    runs-on: windows-2025
    steps:
      - name: Checkout RetroDesk
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Instrument replacement failure
        shell: powershell
        run: |
          $path = "src/storage/retro_fs_win32.c"
          $text = Get-Content $path -Raw
          $pattern = '(if \(!moved\) \{\r?\n        DWORD error = GetLastError\(\);)'
          $replacement = '$1' + "`r`n        fprintf(stderr, `"ReplaceFile/MoveFileEx failed: %lu (existed=%d)\\n`",`r`n                (unsigned long)error, existed ? 1 : 0);"
          $next = [regex]::Replace($text, $pattern, $replacement, 1)
          if ($next -eq $text) { throw "instrumentation pattern not found" }
          Set-Content $path $next -NoNewline

      - name: Install pinned vcpkg
        shell: powershell
        run: |
          git clone --quiet https://github.com/microsoft/vcpkg.git vcpkg
          git -C vcpkg checkout --quiet --detach $env:VCPKG_COMMIT
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics | Out-Null
          .\vcpkg\vcpkg.exe install pdcurses:x64-windows | Out-Null

      - name: Capture strict Win32 build and tests
        shell: powershell
        run: |
          $toolchain = "$PWD\vcpkg\scripts\buildsystems\vcpkg.cmake"
          $pdcursesRoot = "$PWD\vcpkg\installed\x64-windows"
          $commands = @(
            "cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=`"$toolchain`" -DVCPKG_TARGET_TRIPLET=x64-windows -DPDCURSES_ROOT=`"$pdcursesRoot`"",
            "cmake --build build --config Debug --parallel",
            "ctest --test-dir build --output-on-failure -C Debug"
          )
          cmd /d /s /c ($commands -join " && ") *> win32-storage-build.log
          $code = $LASTEXITCODE
          Get-Content win32-storage-build.log -Tail 320
          exit $code

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: win32-storage-build-log
          path: win32-storage-build.log
          if-no-files-found: error
