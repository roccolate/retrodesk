name: Agent Win32 Storage Patch

on:
  push:
    branches: [agent/native-win32-storage]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/native-win32-storage
          fetch-depth: 0

      - name: Apply build wiring and remove temporary automation
        run: python3 scripts/apply_win32_storage_patch.py

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "build: wire native Win32 storage"
          git push origin HEAD:agent/native-win32-storage
