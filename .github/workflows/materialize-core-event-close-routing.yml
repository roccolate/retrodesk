name: Materialize core event and close routing

on:
  pull_request:
    branches: [main]
    paths:
      - tools/materialize_core_event_close_routing.py
      - .github/workflows/materialize-core-event-close-routing.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'core/harden-event-close-routing'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libncurses-dev python3

      - name: Apply core hardening slice
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/materialize_core_event_close_routing.py')
          text = path.read_text(encoding='utf-8')
          old = '''            if changed == original:
                raise RuntimeError(f"{relative}: transformation made no change")
            rendered[path] = changed
'''
          new = '''            if changed == original:
                if relative.startswith(("src/", "tests/")):
                    raise RuntimeError(
                        f"{relative}: transformation made no change")
                continue
            rendered[path] = changed
'''
          if text.count(old) != 1:
              raise SystemExit('required-change guard marker missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          set +e
          python3 tools/materialize_core_event_close_routing.py > /tmp/core-apply.log 2>&1
          status=$?
          cat /tmp/core-apply.log
          if [ "$status" -ne 0 ]; then
            mkdir -p ci-artifacts
            cp /tmp/core-apply.log ci-artifacts/core-hardening-apply.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ci-artifacts/core-hardening-apply.log
            git commit -m "chore: capture core hardening apply failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

      - name: Guard generated tree
        run: |
          git diff --check
          python3 scripts/check_test_oracles.py
          python3 scripts/check_djgpp_sources.py
          if grep -R "F1/F2 launcher" -n README.md INSTALL.md docs src; then
            echo "stale F1/F2 launcher documentation remains"
            exit 1
          fi

      - name: Configure strict Debug build
        run: |
          cmake -S . -B build/core-hardening \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DENABLE_STRICT_WARNINGS=ON \
            -DENABLE_WERROR=ON

      - name: Build and test
        run: |
          cmake --build build/core-hardening --parallel
          ctest --test-dir build/core-hardening --output-on-failure

      - name: Publish verified source tree
        run: |
          rm -f tools/materialize_core_event_close_routing.py
          rm -f .github/workflows/materialize-core-event-close-routing.yml
          rm -rf ci-artifacts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "core: harden event and app-close routing"
          git push origin HEAD:${{ github.head_ref }}
