name: Materialize Notepad word wrap

on:
  pull_request:
    branches: [main, master]
    paths:
      - scripts/apply_notepad_word_wrap.py
      - scripts/fix_word_wrap_test_helper.py
      - scripts/run_notepad_word_wrap_ci.sh
      - .github/workflows/notepad-word-wrap-bootstrap.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/notepad-word-wrap'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/notepad-word-wrap
          fetch-depth: 1
          persist-credentials: true
          show-progress: false

      - name: Build and test word-wrap integration
        run: bash scripts/run_notepad_word_wrap_ci.sh

      - name: Publish failure diagnostic
        if: failure()
        run: |
          git config user.name "RetroDesk CI"
          git config user.email "actions@users.noreply.github.com"
          git add ci-artifacts/notepad-word-wrap-*.log
          git commit -m "ci: capture Notepad word-wrap failure"
          git push origin HEAD:agent/notepad-word-wrap

      - name: Publish verified word-wrap port
        run: |
          rm -f scripts/apply_notepad_word_wrap.py
          rm -f scripts/fix_word_wrap_test_helper.py
          rm -f scripts/run_notepad_word_wrap_ci.sh
          rm -rf ci-artifacts
          rm -f .github/workflows/notepad-word-wrap-bootstrap.yml
          git config user.name "RetroDesk CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: add UTF-8 Notepad word wrap"
          git push origin HEAD:agent/notepad-word-wrap
