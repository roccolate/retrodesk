name: Materialize Notepad PR

on:
  pull_request:
    branches:
      - agent/core-collection-hardening

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  materialize:
    if: github.event.pull_request.head.ref == 'agent/notepad-native-ux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev

      - name: Apply native Notepad UX slice
        id: apply
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > /tmp/notepad-materializer.log 2>&1
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/materialize-notepad-native-ux.yml')
          source = workflow.read_text(encoding='utf-8')
          start = "          python3 - <<'PY'\n"
          end = "\n          PY\n"
          payload = source.split(start, 1)[1].split(end, 1)[0]
          exec(compile(textwrap.dedent(payload), str(workflow), 'exec'), {})
          PY
          status=$?
          cat /tmp/notepad-materializer.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report materializer failure
        if: steps.apply.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'The native Notepad materializer stopped before compilation:'
            echo
            echo '```text'
            cat /tmp/notepad-materializer.log
            echo '```'
          } > /tmp/notepad-materializer-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/notepad-materializer-comment.md
          exit 1

      - name: Validate strict Linux gates
        if: steps.apply.outputs.status == '0'
        shell: bash
        run: |
          cmake -S . -B build-materialize \
            -DENABLE_TESTS=ON \
            -DENABLE_STRICT_WARNINGS=ON \
            -DENABLE_WERROR=ON
          cmake --build build-materialize --parallel 2
          ctest --test-dir build-materialize --output-on-failure
          python3 scripts/check_test_oracles.py
          python3 scripts/check_djgpp_sources.py

      - name: Publish one focused commit
        if: steps.apply.outputs.status == '0'
        shell: bash
        run: |
          rm -f .github/workflows/materialize-notepad-native-ux.yml
          rm -f .github/workflows/materialize-notepad-pr.yml
          rm -rf build-materialize
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --soft 06f5e939a4da7ce46ccf166072a6213da6a08799
          git add -A
          git commit -m "feat: add native responsive Notepad chrome"
          git push --force-with-lease origin HEAD:agent/notepad-native-ux
